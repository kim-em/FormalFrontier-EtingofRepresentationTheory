name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
          build: false
      - name: Build all individual modules
        run: |
          # Build all individual .lean files but skip chapter/root aggregation
          # files which OOM the 7GB runner by loading all oleans at once.
          # Individual files verify all code compiles correctly.
          find EtingofRepresentationTheory -mindepth 2 -name '*.lean' \
            | sed 's|/|.|g; s|\.lean$||' \
            | xargs lake build
