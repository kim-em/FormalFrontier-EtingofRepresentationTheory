name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Add swap space
        uses: actionhippie/swap-space@v1
        with:
          size: 8G
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
