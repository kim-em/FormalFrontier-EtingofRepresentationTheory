name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
          build: false
      - name: Build all chapters individually
        run: |
          lake build EtingofRepresentationTheory.Chapter2 \
                     EtingofRepresentationTheory.Chapter3 \
                     EtingofRepresentationTheory.Chapter4 \
                     EtingofRepresentationTheory.Chapter5 \
                     EtingofRepresentationTheory.Chapter6 \
                     EtingofRepresentationTheory.Chapter7 \
                     EtingofRepresentationTheory.Chapter8 \
                     EtingofRepresentationTheory.Chapter9 \
                     EtingofRepresentationTheory.Infrastructure.IrreducibleEnumeration \
                     EtingofRepresentationTheory.Infrastructure.RegularCharacter
