name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Add swap space
        uses: actionhippie/swap-space@v1
        with:
          size: 8G
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
          build: false
      - name: Build all modules
        run: |
          # Build individual modules, excluding:
          # - Chapter/root aggregation files (mindepth 2 skips these)
          # - Infrastructure files that import full Mathlib + chapter content,
          #   which require >15GB to compile (exceeds runner capacity)
          EXCLUDE="SpechtModuleSimple|YoungSymTraceKronecker|FrobeniusCharacterBridge"
          find EtingofRepresentationTheory -mindepth 2 -name '*.lean' \
            | grep -vE "$EXCLUDE" \
            | sed 's|/|.|g; s|\.lean$||' \
            | xargs lake build
