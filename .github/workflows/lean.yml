name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Add swap space
        uses: actionhippie/swap-space@v1
        with:
          size: 8G
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
          build: false
      - name: Build (single-threaded to avoid OOM)
        run: |
          # Restrict to 1 CPU core to prevent parallel Lean processes
          # from each loading full Mathlib and exceeding 7GB RAM.
          # Swap provides overflow for peak memory from single process.
          taskset -c 0 lake build
