name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
          build: false
      - name: Build all individual modules
        run: |
          # Build all individual .lean files (skip chapter/root aggregation).
          # Use -j1 to prevent OOM from parallel Lean processes each loading
          # full Mathlib on the 7GB ubuntu-latest runner.
          find EtingofRepresentationTheory -mindepth 2 -name '*.lean' \
            | sed 's|/|.|g; s|\.lean$||' \
            | xargs lake build -j1
